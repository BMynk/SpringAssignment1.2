<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Computer Science Courses</title>
</head>
<body>

<h1>Computer Science Department Courses</h1>

<p>
    <a th:href="@{/courses/new}">Add New Course</a>
</p>

<table>
    <thead>
    <tr>
        <th>Course Code</th>
        <th>Course Name</th>
        <th>Level</th>
        <th>Category</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="course : ${courses}">
        <td th:text="${course.courseCode}">CSC101</td>
        <td th:text="${course.courseName}">Introduction to Computing</td>
        <td th:text="${course.level}">1</td>
        <td th:text="${course.category}">FOUNDATION</td>
        <td>
            <a th:href="@{/courses/edit/{id}(id=${course.id})}">Edit</a>
            |
            <a th:href="@{/courses/delete/{id}(id=${course.id})}"
               onclick="return confirm('Are you sure you want to delete this course?');">
                Delete
            </a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
